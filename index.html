<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Dice</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="splash-screen" class="splash">
        <h1>🎲 Welcome to Custom Dice 🎲</h1>
        <p>
            Create personalized dice for workouts, meal planning, study sessions, 
            or anything you want to randomize!
        </p>
        <button id="startAppBtn">Get Started</button>
        <div id="version-label"></div> <!-- Version will appear here -->
    </div>

    <div id="main-app" class="hidden">

        <div class="content-area">
        
        <div class="app-container">
                    
                <h1>🎲 Custom Dice 🎲</h1>

                <button id="aboutBtn" class="about-icon">ℹ</button>

                <input type="text" id="diceName" placeholder="Dice name (e.g. Workout Dice)">
                <br>

                <input type="text" id="sideInput" placeholder="Add a side (e.g. Pushups)">
                <br>

                <button id="addSideBtn">Add Side</button>

                <div id="sidesList"></div>

                <button id="saveDiceBtn">Save Dice</button>
                <button id="rollDiceBtn">Roll 🎲</button>
                <button id="clearSidesBtn">Clear Current Dice</button>

                <div id="result"></div>

                <hr>

                <h2>Saved Dice</h2>
                <div id="savedDice"></div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
